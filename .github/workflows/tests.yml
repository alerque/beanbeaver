name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests (excluding e2e)
        run: python -m pytest tests --ignore=tests/test_e2e_receipts.py

  native-matcher:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create virtualenv
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"
          echo "VENV_PYTHON=$GITHUB_WORKSPACE/.venv/bin/python" >> "$GITHUB_ENV"
          echo "VENV_MATURIN=$GITHUB_WORKSPACE/.venv/bin/maturin" >> "$GITHUB_ENV"

      - name: Install native test dependencies
        run: |
          "$VENV_PYTHON" -m pip install --upgrade pip
          "$VENV_PYTHON" -m pip install -e ".[test,dev]"

      - name: Build native matcher extension
        run: |
          "$VENV_MATURIN" develop

      - name: Assert native matcher backend is loaded
        env:
          BEANBEAVER_REQUIRE_RUST_MATCHER: "1"
        run: |
          "$VENV_PYTHON" -c "from beanbeaver.receipt.matcher import rust_backend_loaded; assert rust_backend_loaded()"

      - name: Run matcher tests with native backend
        env:
          BEANBEAVER_REQUIRE_RUST_MATCHER: "1"
        run: |
          "$VENV_PYTHON" -m pytest tests/test_matcher.py
