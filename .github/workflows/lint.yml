name: Lint

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy --config-file pyproject.toml . --ignore-missing-imports --no-error-summary

      - name: Mypy strict
        run: mypy --config-file pyproject.toml . --ignore-missing-imports --no-error-summary --disallow-untyped-defs --warn-redundant-casts --warn-unreachable
